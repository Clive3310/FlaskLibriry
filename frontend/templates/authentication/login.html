<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/login.css') }}">
</head>

<body>

<section class="hero is-fullheight">
    <div class="hero-body">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-5-tablet is-4-desktop is-3-widescreen">

                    <form class="box" id="loginForm">
                        <h1 class="title has-text-centered">Login</h1>

                        <div class="field">
                            <label class="label">Email</label>
                            <div class="control">
                                <input class="input" type="email" id="email" name="email" placeholder="Enter email" required>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Password</label>
                            <div class="control">
                                <input class="input" type="password" id="password" name="password" placeholder="Enter password" required>
                            </div>
                        </div>

                        <div class="field">
                            <button class="button is-primary is-fullwidth">
                                Login
                            </button>
                        </div>
                    </form>
                    <div class="notification is-danger is-light mt-4" id="error_message" style="display: none;">
                        <p>Wrong email or password</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="{{ url_for('static', filename='JS/login.js') }}"></script>

</body>
</html>
